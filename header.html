<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEPHORIA WEAR | Streetwear Redefined</title>

    <!-- Meta Description -->
    <meta name="description"
        content="Shop the latest drop from ELEPHORIA WEAR. Premium, printable, and customizable T-shirts. Redefine your streetwear aesthetic.">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
        <div class="container-fluid px-4 px-lg-5">
            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/EleWear Black.png" alt="ELEPHORIAWEAR" height="60" class="me-2">
                <span class="d-none d-sm-inline">ELEPHORIAWEAR</span>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false"
                aria-label="Toggle navigation">
                <i class="bi bi-list fs-2"></i>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 text-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="shop.html">Shop</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="customize.html">Customize</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="lookbook.html">Lookbook</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>

                <!-- Right Icons -->
                <div class="d-flex justify-content-center align-items-center gap-3 mt-3 mt-lg-0">
                    <a href="search.html" class="text-dark" data-bs-toggle="modal" data-bs-target="#searchModal">
                        <i class="bi bi-search fs-5"></i>
                    </a>
                    <a href="#" class="text-dark" data-bs-toggle="modal" data-bs-target="#loginModal">
                        <i class="bi bi-person fs-5"></i>
                    </a>
                    <a href="cart.html" class="text-dark position-relative">
                        <i class="bi bi-bag fs-5"></i>
                        <span class="cart-badge" id="cartBadgeCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Search Modal -->
    <div class="modal fade" id="searchModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content bg-white bg-opacity-95 text-center">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close fs-3 m-3" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex align-items-center justify-content-center">
                    <div class="container">
                        <h2 class="display-5 fw-bold text-uppercase mb-4">What are you looking for?</h2>
                        <form action="shop.html" method="GET" class="position-relative w-100 mx-auto"
                            style="max-width: 600px;">
                            <input type="text" name="q"
                                class="form-control form-control-lg rounded-0 border-0 border-bottom border-dark border-3 bg-transparent shadow-none fs-3 py-3 ps-0 pe-5"
                                placeholder="Search products..." autofocus>
                            <button type="submit"
                                class="btn position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent text-dark p-0">
                                <i class="bi bi-search fs-3"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-0 border-dark border-opacity-10 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close m-2 shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 p-md-5 pt-0">
                    <div class="text-center mb-4">
                        <h2 class="h3 fw-bold text-uppercase mb-2">Welcome Back</h2>
                        <p class="small text-gray-dark">Sign in to access your saved designs and fast checkout.</p>
                    </div>

                    <form
                        onsubmit="event.preventDefault(); alert('Login Successful!'); var m = bootstrap.Modal.getInstance(document.getElementById('loginModal')); if(m) m.hide(); window.location.href='index.html';">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase text-dark">Email</label>
                            <input type="email" class="form-control rounded-0 border-dark shadow-none p-3" required>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-bold small text-uppercase text-dark">Password</label>
                                <a href="#" class="small text-gray-dark text-decoration-none">Forgot?</a>
                            </div>
                            <input type="password" class="form-control rounded-0 border-dark shadow-none p-3" required>
                        </div>
                        <button type="submit" class="btn btn-elephoria w-100 py-3 mb-3">Sign In</button>
                    </form>

                    <div class="text-center">
                        <p class="small text-gray-dark mb-0">
                            Don't have an account?
                            <a href="signup.html" class="text-dark fw-bold text-decoration-underline">Create one</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="main.js"></script>
</body>

</html>
