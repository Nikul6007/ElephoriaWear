<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ELEPHORIA WEAR</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">



    <!-- Main Content -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5" style="margin-top:150px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="card rounded-0 border-dark border-opacity-10 shadow-sm">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-5">
                                <h1 class="h2 fw-bold text-uppercase mb-2">Join the Club</h1>
                                <p class="text-gray-dark">Create an account to track orders, save custom designs, and
                                    get exclusive access to drops.</p>
                            </div>

                            <form
                                onsubmit="event.preventDefault(); alert('Dummy Sign Up Successful!'); window.location.href='index.html';">
                                <div class="row mb-3">
                                    <div class="col-sm-6 mb-3 mb-sm-0">
                                        <label class="form-label fw-bold small text-uppercase text-dark">First
                                            Name</label>
                                        <input type="text" class="form-control rounded-0 border-dark shadow-none p-3"
                                            required>
                                    </div>
                                    <div class="col-sm-6">
                                        <label class="form-label fw-bold small text-uppercase text-dark">Last
                                            Name</label>
                                        <input type="text" class="form-control rounded-0 border-dark shadow-none p-3"
                                            required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-uppercase text-dark">Email</label>
                                    <input type="email" class="form-control rounded-0 border-dark shadow-none p-3"
                                        required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label fw-bold small text-uppercase text-dark">Password</label>
                                    <input type="password" class="form-control rounded-0 border-dark shadow-none p-3"
                                        required>
                                </div>

                                <button type="submit" class="btn btn-elephoria w-100 py-3 mb-4">Create Account</button>

                                <div class="text-center">
                                    <p class="small text-gray-dark mb-0">Already have an account? <a href="#loginModal"
                                            class="text-dark fw-bold text-decoration-underline" data-bs-toggle="modal"
                                            data-bs-target="#loginModal">Sign in</a></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-0 border-dark border-opacity-10 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close m-2 shadow-none" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 p-md-5 pt-0">
                    <div class="text-center mb-4">
                        <h2 class="h3 fw-bold text-uppercase mb-2">Welcome Back</h2>
                        <p class="small text-gray-dark">Sign in to access your saved designs and fast checkout.</p>
                    </div>

                    <form
                        onsubmit="event.preventDefault(); alert('Dummy Login Successful!'); var m = bootstrap.Modal.getInstance(document.getElementById('loginModal')); if(m) m.hide(); window.location.href='index.html';">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase text-dark">Email</label>
                            <input type="email" class="form-control rounded-0 border-dark shadow-none p-3" required>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-bold small text-uppercase text-dark">Password</label>
                                <a href="#" class="small text-gray-dark text-decoration-none">Forgot?</a>
                            </div>
                            <input type="password" class="form-control rounded-0 border-dark shadow-none p-3" required>
                        </div>
                        <button type="submit" class="btn btn-elephoria w-100 py-3 mb-3">Sign In</button>
                    </form>

                    <div class="text-center">
                        <p class="small text-gray-dark mb-0">
                            Don't have an account?
                            <a href="signup.html" class="text-dark fw-bold text-decoration-underline">Create one</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script src="main.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsf8ae-SOJ33KqkV7aoE9VfnjDqu-rYrk",
            authDomain: "elephoriawear.firebaseapp.com",
            projectId: "elephoriawear",
            appId: "1:710576836174:web:de011e5a22dcbaf9dbbd1f"
        };

        // Initialize Firebase if not already
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();

        // Signup Form Handler
        document.addEventListener('submit', function (e) {
            // Form ID 'signupForm' hashe to
            if (e.target.id === 'signupForm') {
                e.preventDefault();

                const email = document.getElementById('signupEmail').value;
                const password = document.getElementById('signupPassword').value;
                const btn = e.target.querySelector('button');

                btn.innerText = "Creating Account...";
                btn.disabled = true;

                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        alert("Welcome to the Club! Account Created.");
                        window.location.href = 'index.html';
                    })
                    .catch((error) => {
                        alert(error.message);
                        btn.innerText = "Create Account";
                        btn.disabled = false;
                    });
            }
        });
    </script>

</body>

</html>
