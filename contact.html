<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ELEPHORIA WEAR</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script src="main.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-light">



    <!-- Main Content -->
    <main class="pt-5 mt-5">

        <section class="container py-5 my-5">
            <div class="row align-items-center gx-5">
                <!-- Contact Info -->
                <div class="col-lg-5 mb-5 mb-lg-0">
                    <span class="text-gold fw-bold text-uppercase small tracking-wider mb-2 d-inline-block">Reach
                        Out</span>
                    <h1 class="display-3 fw-bold text-uppercase mb-4">Get in Touch</h1>
                    <p class="lead text-gray-dark mb-5">Have a question about sizing, fabrics, or bulk custom orders?
                        Drop us a line.</p>

                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-black text-white rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 50px; height: 50px;">
                            <i class="bi bi-envelope"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-1 text-uppercase text-dark">Email</h5>
                            <a href="mailto:info@elephoriawear.com" class="text-gray-dark">info@elephoriawear.com</a>
                        </div>
                    </div>

                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-black text-white rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 50px; height: 50px;">
                            <i class="bi bi-geo-alt"></i>
                        </div>
                        <div>
                            <h5 class="fw-bold mb-1 text-uppercase text-dark">Studio</h5>
                            <span class="text-gray-dark">123 Fashion Ave, NY 10001<br>Appointment Only</span>
                        </div>
                    </div>

                    <div class="mt-5 pt-4 border-top border-dark">
                        <h5 class="fw-bold text-uppercase text-dark mb-3">Follow Us</h5>
                        <div class="d-flex gap-2">
                            <a href="#"
                                class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center"
                                style="width: 45px; height: 45px;"><i class="bi bi-instagram"></i></a>
                            <a href="#"
                                class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center"
                                style="width: 45px; height: 45px;"><i class="bi bi-tiktok"></i></a>
                            <a href="#"
                                class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center"
                                style="width: 45px; height: 45px;"><i class="bi bi-twitter-x"></i></a>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <div class="col-lg-7">
                    <div class="bg-white p-4 p-md-5 border border-dark border-opacity-10 shadow-sm">
                        <h3 class="fw-bold text-uppercase mb-4">Send a Message</h3>

                        <form id="contact-form">
                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-bold small text-uppercase text-dark">Name</label>
                                    <input type="text" name="from_name"
                                        class="form-control rounded-0 border-dark shadow-none p-3" required>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <label class="form-label fw-bold small text-uppercase text-dark">Email</label>
                                    <input type="email" name="user_email"
                                        class="form-control rounded-0 border-dark shadow-none p-3" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold small text-uppercase text-dark">Subject</label>
                                <select name="subject" class="form-select rounded-0 border-dark shadow-none p-3">
                                    <option>General Inquiry</option>
                                    <option>Order Status</option>
                                    <option>Returns/Exchanges</option>
                                    <option>Wholesale / Custom Bulk</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold small text-uppercase text-dark">Message</label>
                                <textarea name="message" class="form-control rounded-0 border-dark shadow-none p-3"
                                    rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-elephoria w-100 fs-5 pb-3 pt-3">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>


    <script>


    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
