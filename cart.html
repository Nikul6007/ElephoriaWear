<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | ELEPHORIA WEAR</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-light">


    <!-- Main Content -->
    <main class="pt-5 mt-5 mb-5 pb-5">
        <div class="container">
            <header class="bg-light py-5 mb-5 border-bottom">
                <h1 class="display-4 fw-bold text-uppercase">Your <span
                        class="text-gold border-bottom border-dark border-3 pb-1">Cart</span></h1>
            </header>

            <div class="row gx-5">
                <!-- Cart Items List -->
                <div class="col-lg-8 mb-5 mb-lg-0">
                    <div class="bg-white p-4 p-md-5 border border-dark border-opacity-10 shadow-sm"
                        id="cartItemsContainer">
                        <!-- Items will be injected here via JS -->
                        <div class="text-center py-5 d-none" id="emptyCartMessage">
                            <i class="bi bi-bag-x display-1 text-gray-dark mb-4"></i>
                            <h3 class="fw-bold text-uppercase">Your cart is empty</h3>
                            <p class="text-gray-dark mb-4">Looks like you haven't added any premium threads yet.</p>
                            <a href="shop.html" class="btn btn-elephoria">Start Shopping</a>
                        </div>

                        <!-- Header row -->
                        <div class="row border-bottom border-dark pb-3 mb-4 d-none d-md-flex text-uppercase fw-bold small text-gray-dark"
                            id="cartHeader">
                            <div class="col-6">Product</div>
                            <div class="col-3 text-center">Quantity</div>
                            <div class="col-3 text-end">Total</div>
                        </div>

                        <!-- Injected Content Anchor -->
                        <div id="cartItemsList"></div>

                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="sticky-top" style="top: 100px;">
                        <div class="bg-black text-white p-4 p-md-5 shadow-sm">
                            <h3 class="fw-bold text-uppercase mb-4 border-bottom border-secondary pb-3">Summary</h3>

                            <div class="d-flex justify-content-between mb-3">
                                <span>Subtotal</span>
                                <span class="fw-bold" id="cartSubtotal">₹0.00</span>
                            </div>

                            <div class="d-flex justify-content-between mb-3 text-gray-light small">
                                <span>Shipping</span>
                                <span id="cartShipping">₹0.00</span>
                            </div>

                            <div class="d-flex justify-content-between mb-4 text-gray-light small">
                                <span>Taxes (5% GST)</span>
                                <span id="cartTax">₹0.00</span>
                            </div>

                            <div class="border-top border-secondary pt-4 mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <h4 class="fw-bold text-uppercase m-0">Total</h4>
                                    <h4 class="fw-bold text-gold m-0" id="cartTotal">₹0.00</h4>
                                </div>
                                <p class="small text-gray-light text-end">Or 4 interest-free payments.</p>
                            </div>

                            <a href="#" id="action-button" class="whatsapp-btn-container w-100"
                                onclick="checkout(event)">
                                <span class="whatsapp-btn-text">Order on WhatsApp</span>
                            </a>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


    <!-- Cart Render Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', renderCartContent);

        function renderCartContent() {
            const cart = JSON.parse(localStorage.getItem('elephoria_cart')) || [];
            const container = document.getElementById('cartItemsList');
            const emptyMsg = document.getElementById('emptyCartMessage');
            const header = document.getElementById('cartHeader');
            let subtotal = 0;

            if (cart.length === 0) {
                container.innerHTML = '';
                emptyMsg.classList.remove('d-none');
                header.classList.add('d-none');
                document.getElementById('cartSubtotal').innerText = '₹0.00';
                document.getElementById('cartTotal').innerText = '₹0.00';
                return;
            }

            emptyMsg.classList.add('d-none');
            header.classList.remove('d-none');
            container.innerHTML = '';

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                const itemHTML = `
                <div class="row align-items-center mb-4 pb-4 border-bottom border-light cart-item-row" data-index="${index}">
                    <div class="col-12 col-md-6 mb-3 mb-md-0 d-flex align-items-center">
                        <img src="${item.image}" alt="${item.name}" class="img-fluid object-fit-cover bg-light me-3" style="width: 80px; height: 100px;">
                        <div>
                            <h5 class="fw-bold fs-6 text-uppercase mb-1"><a href="product.html" class="text-dark text-decoration-none">${item.name}</a></h5>
                            <p class="text-gray-dark small mb-0">₹${item.price.toFixed(2)}</p>
                            <span class="small bg-light px-2 py-1 mt-2 d-inline-block text-uppercase fw-bold text-gray-dark">Size: M</span>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 d-flex justify-content-center">
                        <div class="input-group w-auto border border-dark">
                            <button class="btn btn-transparent rounded-0 text-dark fw-bold border-0 px-2 btn-qty-dec" type="button" onclick="updateQty('${item.id}', -1)">-</button>
                            <input type="text" class="form-control text-center p-0 bg-transparent border-0 text-dark fw-bold" value="${item.quantity}" style="width: 40px;" readonly>
                            <button class="btn btn-transparent rounded-0 text-dark fw-bold border-0 px-2 btn-qty-inc" type="button" onclick="updateQty('${item.id}', 1)">+</button>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 text-end d-flex flex-column align-items-end justify-content-center">
                        <p class="fw-bold mb-2">₹${itemTotal.toFixed(2)}</p>
                        <button class="btn btn-link text-danger p-0 small text-decoration-none small text-uppercase fw-bold" onclick="removeItem('${item.id}')"><i class="bi bi-trash3 me-1"></i>Remove</button>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });

            document.getElementById('cartSubtotal').innerText = `₹${subtotal.toFixed(2)}`;
            document.getElementById('cartTotal').innerText = `₹${subtotal.toFixed(2)}`;
        } function renderCartContent() {
            const cart = JSON.parse(localStorage.getItem('elephoria_cart')) || [];
            const container = document.getElementById('cartItemsList');
            const emptyMsg = document.getElementById('emptyCartMessage');
            const header = document.getElementById('cartHeader');
            let subtotal = 0;

            // Jo cart khali hoy to
            if (cart.length === 0) {
                container.innerHTML = '';
                emptyMsg.classList.remove('d-none');
                header.classList.add('d-none');

                // Reset all summary values
                document.getElementById('cartSubtotal').innerText = '₹0.00';
                document.getElementById('cartTax').innerText = '₹0.00';
                document.getElementById('cartShipping').innerText = '₹0.00';
                document.getElementById('cartTotal').innerText = '₹0.00';
                return;
            }

            emptyMsg.classList.add('d-none');
            header.classList.remove('d-none');
            container.innerHTML = '';

            // Cart items loop
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                const itemHTML = `
        <div class="row align-items-center mb-4 pb-4 border-bottom border-light cart-item-row" data-index="${index}">
            <div class="col-12 col-md-6 mb-3 mb-md-0 d-flex align-items-center">
                <img src="${item.image}" alt="${item.name}" class="img-fluid object-fit-cover bg-light me-3" style="width: 80px; height: 100px;">
                <div>
                    <h5 class="fw-bold fs-6 text-uppercase mb-1"><a href="product.html" class="text-dark text-decoration-none">${item.name}</a></h5>
                    <p class="text-gray-dark small mb-0">₹${item.price.toLocaleString('en-IN')}</p>
                    <span class="small bg-light px-2 py-1 mt-2 d-inline-block text-uppercase fw-bold text-gray-dark">Size: M</span>
                </div>
            </div>
            <div class="col-6 col-md-3 d-flex justify-content-center">
                <div class="input-group w-auto border border-dark">
                    <button class="btn btn-transparent rounded-0 text-dark fw-bold border-0 px-2 btn-qty-dec" type="button" onclick="updateQty('${item.id}', -1)">-</button>
                    <input type="text" class="form-control text-center p-0 bg-transparent border-0 text-dark fw-bold" value="${item.quantity}" style="width: 40px;" readonly>
                    <button class="btn btn-transparent rounded-0 text-dark fw-bold border-0 px-2 btn-qty-inc" type="button" onclick="updateQty('${item.id}', 1)">+</button>
                </div>
            </div>
            <div class="col-6 col-md-3 text-end d-flex flex-column align-items-end justify-content-center">
                <p class="fw-bold mb-2">₹${itemTotal.toLocaleString('en-IN')}</p>
                <button class="btn btn-link text-danger p-0 small text-decoration-none small text-uppercase fw-bold" onclick="removeItem('${item.id}')"><i class="bi bi-trash3 me-1"></i>Remove</button>
            </div>
        </div>`;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });

            // --- Dynamic Calculations ---
            const gstRate = 0.05; // 5% GST
            const gstAmount = Math.round(subtotal * gstRate);

            // Logic: Jo subtotal 2000 thi vadhare hoy to Free Shipping, baki 40
            const shipping = 0;//subtotal > 2000 ? 0 : 40;

            const finalTotal = subtotal + gstAmount + shipping;

            // --- Update Summary UI ---
            document.getElementById('cartSubtotal').innerText = `₹${subtotal.toLocaleString('en-IN')}`;
            document.getElementById('cartTax').innerText = `₹${gstAmount.toLocaleString('en-IN')}`;
            document.getElementById('cartShipping').innerText = shipping === 0 ? "FREE" : `₹${shipping.toLocaleString('en-IN')}`;
            document.getElementById('cartTotal').innerText = `₹${finalTotal.toLocaleString('en-IN')}`;
        }

        function updateQty(id, change) {
            let cart = JSON.parse(localStorage.getItem('elephoria_cart')) || [];
            const idx = cart.findIndex(item => item.id === id);
            if (idx > -1) {
                cart[idx].quantity += change;
                if (cart[idx].quantity < 1) cart[idx].quantity = 1;
                localStorage.setItem('elephoria_cart', JSON.stringify(cart));
                updateCartBadge(cart);
                renderCartContent();
            }
        }

        function removeItem(id) {
            let cart = JSON.parse(localStorage.getItem('elephoria_cart')) || [];
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('elephoria_cart', JSON.stringify(cart));
            updateCartBadge(cart);
            renderCartContent();
        }



    </script>
</body>

</html>
