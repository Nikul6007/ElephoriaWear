<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | ELEPHORIA WEAR</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link href="styles.css" rel="stylesheet">
</head>

<body class="bg-light">


    <!-- Main Content -->
    <main class="pt-5 mt-5 mb-5 pb-5">
        <div class="container">
            <header class="bg-light py-5 mb-5 border-bottom">
                <h1 class="display-4 fw-bold text-uppercase">Your <span
                        class="text-gold border-bottom border-dark border-3 pb-1">Cart</span></h1>
            </header>

            <div class="row gx-5">
                <!-- Cart Items List -->
                <div class="col-lg-8 mb-5 mb-lg-0">
                    <div class="bg-white p-4 p-md-5 border border-dark border-opacity-10 shadow-sm"
                        id="cartItemsContainer">
                        <!-- Items will be injected here via JS -->
                        <div class="text-center py-5 d-none" id="emptyCartMessage">
                            <i class="bi bi-bag-x display-1 text-gray-dark mb-4"></i>
                            <h3 class="fw-bold text-uppercase">Your cart is empty</h3>
                            <p class="text-gray-dark mb-4">Looks like you haven't added any premium threads yet.</p>
                            <a href="shop.html" class="btn btn-elephoria">Start Shopping</a>
                        </div>

                        <!-- Header row -->
                        <div class="row border-bottom border-dark pb-3 mb-4 d-none d-md-flex text-uppercase fw-bold small text-gray-dark"
                            id="cartHeader">
                            <div class="col-6">Product</div>
                            <div class="col-3 text-center">Quantity</div>
                            <div class="col-3 text-end">Total</div>
                        </div>

                        <!-- Injected Content Anchor -->
                        <div id="cartItemsList"></div>

                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="sticky-top" style="top: 100px;">
                        <div class="bg-black text-white p-4 p-md-5 shadow-sm">
                            <h3 class="fw-bold text-uppercase mb-4 border-bottom border-secondary pb-3">Summary</h3>

                            <div class="d-flex justify-content-between mb-3">
                                <span>Subtotal</span>
                                <span class="fw-bold" id="cartSubtotal">₹0.00</span>
                            </div>

                            <div class="d-flex justify-content-between mb-3 text-gray-light small">
                                <span>Shipping</span>
                                <span id="cartShipping">₹0.00</span>
                            </div>

                            <div class="d-flex justify-content-between mb-4 text-gray-light small">
                                <span>Taxes (5% GST)</span>
                                <span id="cartTax">₹0.00</span>
                            </div>

                            <div class="border-top border-secondary pt-4 mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <h4 class="fw-bold text-uppercase m-0">Total</h4>
                                    <h4 class="fw-bold text-gold m-0" id="cartTotal">₹0.00</h4>
                                </div>
                                <p class="small text-gray-light text-end">Or 4 interest-free payments.</p>
                            </div>

                            <a href="#" id="action-button" class="whatsapp-btn-container w-100"
                                onclick="checkout(event)">
                                <span class="whatsapp-btn-text">Order on WhatsApp</span>
                            </a>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>



    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


    <!-- Cart Render Logic -->
    <script>
        // 1. Function to get the correct Key
        function getActiveCartKey() {
            // main.js ma jo getCartKey define hoy to te vapro, nai to default
            if (typeof getCartKey === 'function') {
                return getCartKey();
            }
            return 'elephoria_cart';
        }

        // 2. Remove Item Function (Global)
        window.removeItem = function (id) {
            const cartKey = getActiveCartKey();
            let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

            // Filter out the item
            cart = cart.filter(item => item.id !== id);

            // Save back to storage
            localStorage.setItem(cartKey, JSON.stringify(cart));

            // --- AA TRN LINE REFRESH VAGAR UI UPDATE KARSE ---
            if (typeof updateCartBadge === 'function') {
                updateCartBadge(cart); // Header no badge update thase
            }

            renderCartContent(); // Page na items fari render thase (No Refresh Needed)
            console.log("Item removed successfully:", id);
        };

        // 3. Update Quantity Function (Global)
        window.updateQty = function (id, change) {
            const cartKey = getActiveCartKey();
            let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
            const idx = cart.findIndex(item => item.id === id);

            if (idx > -1) {
                cart[idx].quantity += change;
                if (cart[idx].quantity < 1) cart[idx].quantity = 1;

                localStorage.setItem(cartKey, JSON.stringify(cart));
                renderCartContent(); // UI update
                if (typeof updateCartBadge === 'function') updateCartBadge(cart);
            }
        };

        // 4. Content Render Function
        function renderCartContent() {
            const cartKey = getActiveCartKey();
            const cart = JSON.parse(localStorage.getItem(cartKey)) || [];

            const container = document.getElementById('cartItemsList');
            const emptyMsg = document.getElementById('emptyCartMessage');
            const header = document.getElementById('cartHeader');

            if (!container) return;

            if (cart.length === 0) {
                container.innerHTML = '';
                emptyMsg.classList.remove('d-none');
                header.classList.add('d-none');
                updateSummaryUI(0);
                return;
            }

            emptyMsg.classList.add('d-none');
            header.classList.remove('d-none');
            container.innerHTML = '';

            let subtotal = 0;
            cart.forEach((item) => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                container.insertAdjacentHTML('beforeend', `
                <div class="row align-items-center mb-4 pb-4 border-bottom border-light">
                    <div class="col-12 col-md-6 mb-3 d-flex align-items-center">
                        <img src="${item.image}" class="img-fluid bg-light me-3" style="width: 80px; height: 100px; object-fit: cover;">
                        <div>
                            <h6 class="fw-bold text-uppercase mb-1">${item.name}</h6>
                            <p class="text-secondary small mb-0">₹${item.price.toLocaleString('en-IN')}</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 text-center">
                        <div class="btn-group border border-dark">
                            <button class="btn btn-sm" onclick="updateQty('${item.id}', -1)">-</button>
                            <span class="px-2 align-self-center fw-bold">${item.quantity}</span>
                            <button class="btn btn-sm" onclick="updateQty('${item.id}', 1)">+</button>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 text-end">
                        <p class="fw-bold mb-1">₹${itemTotal.toLocaleString('en-IN')}</p>
                        <button class="btn btn-link text-danger p-0 small fw-bold text-decoration-none" onclick="removeItem('${item.id}')">REMOVE</button>
                    </div>
                </div>
            `);
            });

            updateSummaryUI(subtotal);
        }

        function updateSummaryUI(subtotal) {
            const gst = Math.round(subtotal * 0.05);
            const total = subtotal + gst;

            document.getElementById('cartSubtotal').innerText = `₹${subtotal.toLocaleString('en-IN')}`;
            document.getElementById('cartTax').innerText = `₹${gst.toLocaleString('en-IN')}`;
            document.getElementById('cartTotal').innerText = `₹${total.toLocaleString('en-IN')}`;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', renderCartContent);
    </script>
</body>

</html>
